---
layout: default
---
<section class="page-header">
  <h1>{{ page.title }}</h1>
</section>

<div class="archive-list">
  {% for tag in site.tags %}
    <section class="archive-group" id="{{ tag[0] | slugify }}">
      <h2>{{ tag[0] }}</h2>
      {% assign tag_posts = tag[1] %}
      {% include post-list.html posts=tag_posts %}
    </section>
  {% endfor %}
</div>
